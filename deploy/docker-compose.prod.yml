# SYNAPTIQ — production docker-compose
# Usage:
#   export REDIS_PASSWORD="$(grep '^REDIS_PASSWORD=' backend/.env | cut -d= -f2)"
#   docker compose -f deploy/docker-compose.prod.yml up -d
#
# Prerequisites: MongoDB Atlas (external), domain DNS pointing to this host,
#                SSL certs at /etc/letsencrypt/live/<DOMAIN>/ via certbot.
#
# Note: REDIS_PASSWORD must be exported into the shell (or placed in deploy/.env)
#       so Docker Compose can substitute ${REDIS_PASSWORD} in the redis command
#       and healthcheck. The backend container reads it from backend/.env via env_file.

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: synaptiq-backend:latest
    container_name: synaptiq_backend
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - ../backend/.env
    environment:
      - WORKERS=4
      # Force production mode regardless of what .env says
      - APP_ENV=production
      - COOKIE_SECURE=1
      # REDIS_URL is read from backend/.env and points to synaptiq_redis with password
    expose:
      - "8000"
    networks:
      - synaptiq_net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: synaptiq_redis
    restart: unless-stopped
    stop_grace_period: 15s
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass "${REDIS_PASSWORD}"
      --save 900 1
      --save 300 10
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
      --no-appendfsync-on-rewrite yes
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --tcp-keepalive 300
      --timeout 300
      --loglevel notice
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - synaptiq_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:1.25-alpine
    container_name: synaptiq_nginx
    restart: unless-stopped
    stop_grace_period: 15s
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      # Frontend build — copy ./frontend/build here before starting
      - ../frontend/build:/var/www/html:ro
    networks:
      - synaptiq_net
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  redis_data:
    driver: local
  certbot_www:
    driver: local

networks:
  synaptiq_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
