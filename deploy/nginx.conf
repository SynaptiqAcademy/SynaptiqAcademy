# SYNAPTIQ — nginx production configuration
# Domain: synaptiq.academy  /  API: api.synaptiq.academy
# Assumes SSL certs from: certbot certonly --webroot -w /var/www/certbot
#   -d synaptiq.academy -d www.synaptiq.academy -d api.synaptiq.academy
#
# Reload after cert renewal: docker exec synaptiq_nginx nginx -s reload

# Rate-limit zones must live in the http context (not inside server blocks)
# api_general: 60 requests/minute per IP, 10 MB shared memory
# api_auth:    10 requests/minute per IP for auth endpoints
limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=10r/m;

# Uptime-monitor IP allowlist (optional — remove if you use a public monitor URL)
# geo $monitor_allowed {
#   default 0;
#   1.2.3.4/32 1;   # UptimeRobot / BetterStack probe IP
# }

# --- HTTP → HTTPS redirect for all vhosts ---
server {
    listen 80;
    server_name synaptiq.academy www.synaptiq.academy api.synaptiq.academy;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Frontend: synaptiq.academy (React SPA) ---
server {
    listen 443 ssl http2;
    server_name synaptiq.academy www.synaptiq.academy;

    ssl_certificate     /etc/letsencrypt/live/synaptiq.academy/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/synaptiq.academy/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    root /var/www/html;
    index index.html;

    # Cache static assets aggressively (hashed filenames from CRA build)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback — every non-file path serves index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}

# --- API: api.synaptiq.academy (FastAPI backend) ---
server {
    listen 443 ssl http2;
    server_name api.synaptiq.academy;

    ssl_certificate     /etc/letsencrypt/live/synaptiq.academy/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/synaptiq.academy/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL_API:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 50M;
    proxy_read_timeout   120s;
    proxy_connect_timeout 10s;

    # Auth endpoints — tighter rate limit
    location ~ ^/api/(auth|register|login|password-reset) {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://synaptiq_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # Health check — no rate limit (monitors call this frequently)
    location = /api/health {
        proxy_pass         http://synaptiq_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        access_log off;
    }

    # WebSocket upgrade for real-time features
    location /api/ws/ {
        proxy_pass         http://synaptiq_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
    }

    # All other API routes
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;
        proxy_pass         http://synaptiq_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Deny everything else
    location / {
        return 404;
    }
}
