apiVersion: apps/v1
kind: Deployment
metadata:
  name: synaptiq-backend
  namespace: synaptiq
  labels:
    app: synaptiq-backend
spec:
  replicas: 3                    # Minimum for HA; scale to 10+ under load
  selector:
    matchLabels:
      app: synaptiq-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime deploys
  template:
    metadata:
      labels:
        app: synaptiq-backend
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: backend
          image: synaptiq-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: "production"
            - name: WORKERS
              value: "4"           # 4 uvicorn workers per pod
            - name: MONGO_MAX_POOL
              value: "50"          # Per-pod pool; total = replicas × 50
            - name: COOKIE_SECURE
              value: "1"
            # Secrets from Kubernetes Secret (create with kubectl create secret)
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: synaptiq-secrets
                  key: mongodb-uri
            - name: MONGODB_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: synaptiq-secrets
                  key: mongodb-db-name
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: synaptiq-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: synaptiq-secrets
                  key: jwt-secret
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: synaptiq-secrets
                  key: encryption-key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: synaptiq-secrets
                  key: openai-api-key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: synaptiq-secrets
                  key: anthropic-api-key
                  optional: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                # Allow in-flight requests to complete before shutdown
                command: ["/bin/sh", "-c", "sleep 10"]
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: synaptiq-backend
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: synaptiq-backend
  namespace: synaptiq
spec:
  selector:
    app: synaptiq-backend
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
