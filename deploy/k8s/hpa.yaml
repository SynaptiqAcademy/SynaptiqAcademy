apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: synaptiq-backend-hpa
  namespace: synaptiq
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: synaptiq-backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60       # Scale up when avg CPU > 60%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70       # Scale up when avg memory > 70%
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60  # Wait 60s before scaling up again
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60           # Add at most 2 pods per minute
    scaleDown:
      stabilizationWindowSeconds: 300 # Wait 5 min before scaling down (avoid flapping)
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120          # Remove at most 1 pod per 2 minutes
