## Railway deployment config for the SYNAPTIQ backend (FastAPI).
##
## This repo is a monorepo (/frontend on Vercel, /backend on Railway). For
## this file to take effect, the Railway service's Root Directory must be
## set to `backend` (Service → Settings → Source → Root Directory). All
## paths below are then relative to backend/, matching the local dev layout
## (`server.py` at the backend root, `requirements.txt` alongside it).
##
## Nixpacks builder is used instead of the repo's deploy/Dockerfile because
## that Dockerfile's COPY paths assume a repo-root build context (COPY
## backend/...), which doesn't match a backend-scoped Root Directory.

[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "gunicorn server:app -k uvicorn.workers.UvicornWorker --workers ${WORKERS:-2} --bind 0.0.0.0:$PORT --timeout 120 --max-requests 1000 --max-requests-jitter 100 --access-logfile - --error-logfile -"
healthcheckPath = "/api/health/live"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
