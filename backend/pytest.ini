[pytest]
# ── Discovery ──────────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── asyncio ───────────────────────────────────────────────────────────────────
asyncio_mode = auto

# ── Output ────────────────────────────────────────────────────────────────────
addopts =
    -q
    --tb=short
    --strict-markers
    -W ignore::DeprecationWarning
    -W ignore::PendingDeprecationWarning

# ── Markers ───────────────────────────────────────────────────────────────────
markers =
    unit: Pure unit tests — no network, no DB
    integration: Requires live MongoDB at localhost:27017
    security: Security-focused tests
    performance: Latency/throughput benchmarks
    regression: Regression protection suite
    slow: Tests that take > 2 seconds

# ── Coverage (used when --cov is passed) ─────────────────────────────────────
[coverage:run]
source = .
omit =
    tests/*
    venv/*
    */__pycache__/*
    */migrations/*
    seed*.py
    create_test_accounts.py
    test_atlas_connection.py

[coverage:report]
skip_covered = false
show_missing = true
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if TYPE_CHECKING:
    pass
