<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta name="description" content="Synaptiq — the research platform for modern academics. Collaborate, write, publish, and measure your impact in one workspace." />
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="Synaptiq" />
        <meta property="og:title" content="Synaptiq — Research Platform for Academics" />
        <meta property="og:description" content="The research platform for modern academics. Collaborate, write, publish, and measure your impact in one workspace." />
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Synaptiq — Research Platform for Academics" />
        <meta name="twitter:description" content="The research platform for modern academics. Collaborate, write, publish, and measure your impact in one workspace." />
        <!--
            AUTH-004: Content-Security-Policy meta tag.
            'unsafe-inline' removed from script-src.
            Set INLINE_RUNTIME_CHUNK=false in .env.local to avoid CRA runtime inline script.
            Production web server (nginx/caddy) should echo this as an HTTP header.
        -->
        <meta http-equiv="Content-Security-Policy" content="
            default-src 'self';
            script-src 'self' https://js.stripe.com https://us-assets.i.posthog.com https://us.i.posthog.com;
            style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
            font-src 'self' data: https://fonts.gstatic.com;
            img-src 'self' data: blob: https:;
            connect-src 'self' http://localhost:8000 ws://localhost:8000 https://api.synaptiq.academy wss://api.synaptiq.academy https://us.i.posthog.com https://api.stripe.com https://js.stripe.com https://hooks.stripe.com https://sandbox.orcid.org https://orcid.org https://api.openalex.org wss:;
            frame-src 'self' https://js.stripe.com https://hooks.stripe.com;
            frame-ancestors 'self';
            form-action 'self';
            base-uri 'self';
            object-src 'none';
        " />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <title>Synaptiq — Research Platform for Academics</title>
        <!-- AUTH-004: Moved from inline script to external file (no unsafe-inline needed) -->
        <script src="%PUBLIC_URL%/error-handler.js"></script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
        <!-- AUTH-004: PostHog moved from inline to external script -->
        <script src="%PUBLIC_URL%/analytics-init.js"></script>
    </body>
</html>
